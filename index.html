<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>FocusFlow</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FocusFlow">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" as="style" onload="this.rel='stylesheet'">
<style>
:root{
  --bg:#F5EFE6;--s1:#FFFFFF;--s2:#F0E8DB;--s3:#E8DDD0;--s4:#DDD0BF;
  --ac:#6B3F1E;--ac2:#8B5A2B;
  --gr:#4A7C59;--or:#C17F24;--rd:#C0392B;--bl:#2471A3;--pk:#8E44AD;
  --t1:#2C1810;--t2:#7A5C42;--t3:#BCA48C;
  --b1:rgba(107,63,30,.08);--b2:rgba(107,63,30,.16);
  --sh:0 2px 14px rgba(107,63,30,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Tajawal','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--t1);direction:rtl;overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;outline:none}
input,textarea,select{font-family:inherit;border:none;outline:none;background:none;color:inherit}
::-webkit-scrollbar{display:none}
textarea{resize:none}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
#sb{flex-shrink:0;padding:14px 18px 0;display:flex;justify-content:space-between;align-items:center;min-height:56px}
.sb-g{font-size:12px;color:var(--t3);font-weight:600}
.sb-n{font-size:22px;font-weight:900;color:var(--t1);letter-spacing:-.5px}
.sb-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;cursor:pointer;flex-shrink:0}
#area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pg{display:none;padding-bottom:16px}
.pg.on{display:block;animation:pgIn .22s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#tb{flex-shrink:0;background:var(--s1);border-top:1px solid var(--b1);display:flex;align-items:stretch;padding:0 2px env(safe-area-inset-bottom,10px);box-shadow:0 -3px 16px rgba(107,63,30,.07);border-radius:22px 22px 0 0}
.tbb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 1px 0;cursor:pointer;transition:all .2s;border-radius:12px;margin:5px 1px 0}
.tbb .tic{width:24px;height:24px;transition:transform .22s;color:var(--t3)}
.tbb.on .tic{transform:scale(1.12) translateY(-2px);color:var(--ac)}
.tbb .tlb{font-size:8px;font-weight:700;color:var(--t3);transition:color .2s}
.tbb.on .tlb{color:var(--ac)}
.tbb.on{background:rgba(107,63,30,.08);border-radius:12px}
.ph{padding:14px 18px 10px;display:flex;justify-content:space-between;align-items:flex-start}
.ph-t{font-size:26px;font-weight:900;color:var(--t1);letter-spacing:-.5px}
.ph-s{font-size:12px;color:var(--t3);margin-top:2px}
.ph-btn{width:42px;height:42px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;box-shadow:0 6px 20px rgba(107,63,30,.4);cursor:pointer;flex-shrink:0}
.ph-btn:active{transform:scale(.9)}
.hero{background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:22px;padding:20px;margin:0 18px 14px;position:relative;overflow:hidden;box-shadow:0 8px 28px rgba(107,63,30,.28)}
.hero::before{content:'';position:absolute;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07);top:-60px;left:-40px}
.hero-lbl{font-size:11px;color:rgba(255,255,255,.65);font-weight:700;letter-spacing:.5px;margin-bottom:4px;position:relative}
.hero-num{font-size:52px;font-weight:900;color:#fff;letter-spacing:-3px;line-height:1;position:relative}
.hero-sub{font-size:13px;color:rgba(255,255,255,.75);font-weight:600;margin-top:3px;position:relative}
.hero-pills{display:flex;gap:8px;margin-top:14px;position:relative;flex-wrap:wrap}
.hero-pill{background:rgba(255,255,255,.18);border-radius:50px;padding:6px 12px;font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:5px}
.ss{display:flex;gap:9px;padding:0 18px 12px;overflow-x:auto}
.sc{flex-shrink:0;min-width:80px;background:var(--s1);border-radius:20px;padding:13px 10px;text-align:center;box-shadow:var(--sh);position:relative;overflow:hidden}
.sc-i{height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:5px}
.sc-v{font-size:24px;font-weight:900;letter-spacing:-1.5px}
.sc-l{font-size:10px;font-weight:700;color:var(--t3);margin-top:2px}
.sc-bar{position:absolute;bottom:0;left:0;right:0;height:3px}
.chips{display:flex;gap:7px;padding:0 18px 12px;overflow-x:auto}
.chip{flex-shrink:0;border-radius:50px;padding:9px 14px;font-size:13px;font-weight:700;border:1.5px solid var(--b2);white-space:nowrap;display:flex;align-items:center;gap:5px;cursor:pointer;background:var(--s1);transition:all .2s;box-shadow:var(--sh)}
.chip.on{color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(107,63,30,.3)}
.chip-n{font-size:10px;font-weight:800;background:rgba(255,255,255,.28);border-radius:50px;padding:1px 6px}
.srch{display:flex;align-items:center;gap:10px;background:var(--s1);border:1.5px solid var(--b2);border-radius:14px;padding:11px 14px;margin:0 18px 12px;box-shadow:var(--sh)}
.srch:focus-within{border-color:var(--ac)}
.srch input{flex:1;font-size:15px;color:var(--t1)}
.srch input::placeholder{color:var(--t3)}
.pp{padding:0 18px}
.tc{background:var(--s1);border-radius:16px;margin-bottom:9px;overflow:hidden;cursor:pointer;box-shadow:var(--sh);transition:transform .15s;position:relative}
.tc:active{transform:scale(.984)}
.tc-acc{position:absolute;right:0;top:0;bottom:0;width:4px}
.tc-in{display:flex;align-items:flex-start;gap:11px;padding:13px 14px}
.ck{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--b2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .25s;cursor:pointer;background:none}
.ck.done{border-color:transparent}
.ck.done::after{content:'έεΥ';color:#fff;font-size:12px;font-weight:900}
.tb2{flex:1;min-width:0}
.tn{font-size:15px;font-weight:700;color:var(--t1);line-height:1.3}
.tn.done{color:var(--t3);text-decoration:line-through}
.tnote{font-size:12px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tmeta{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center}
.ttag{font-size:11px;font-weight:700;border-radius:7px;padding:2px 9px}
.tdt{font-size:11px;color:var(--t3)}
.tpi{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:flex-start}
.sub-bar{height:3px;background:var(--s2);margin:0 14px 10px;border-radius:50px;overflow:hidden}
.sub-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--ac),var(--ac2))}
.slbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;padding:10px 18px 5px;display:block}
.empty{text-align:center;padding:50px 24px}
.empty-ic{font-size:52px;margin-bottom:12px;opacity:.3;display:block}
.empty-t{font-size:18px;font-weight:800;color:var(--t2)}
.empty-s{font-size:13px;color:var(--t3);margin-top:5px}
#modal{position:fixed;inset:0;background:rgba(20,10,5,.75);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#modal.open{display:flex;animation:fo .2s ease}
@keyframes fo{from{opacity:0}to{opacity:1}}
.sheet{background:#FFFCF8;width:100%;max-width:430px;border-radius:28px 28px 0 0;border-top:2px solid rgba(107,63,30,.15);max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:su .3s cubic-bezier(.32,.72,0,1);padding-bottom:40px;box-shadow:0 -8px 40px rgba(107,63,30,.2)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-hand{width:42px;height:5px;background:var(--s3);border-radius:3px;margin:13px auto 0}
.sh-top{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px;border-bottom:1px solid var(--b1)}
.sh-tit{font-size:21px;font-weight:900;color:var(--t1)}
.sh-x{width:32px;height:32px;background:var(--s2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t2);cursor:pointer;border:1.5px solid var(--b2);font-weight:700}
.sh-body{padding:16px 20px 0}
.fg{margin-bottom:14px}
.fl{font-size:10px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.fi{width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:12px;padding:13px 15px;font-size:15px;color:var(--t1);transition:border-color .2s}
.fi:focus{border-color:var(--ac)}
.fta{width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:12px;padding:13px 15px;font-size:15px;color:var(--t1);height:80px;transition:border-color .2s}
.fta:focus{border-color:var(--ac)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.btn{width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 6px 20px rgba(107,63,30,.35);border:none}
.btn-s{background:var(--gr);color:#fff;border:none}
.btn-d{background:rgba(192,57,43,.1);color:var(--rd);border:1.5px solid rgba(192,57,43,.2)}
.btn-g{background:none;color:var(--ac);border:1.5px solid var(--b2)}
.pri-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:6px}
.pb{background:var(--s1);border:2px solid var(--b2);border-radius:12px;padding:11px 4px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(107,63,30,.06)}
.rec-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.ro{padding:9px 14px;border-radius:50px;background:var(--s1);border:1.5px solid var(--b2);font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;transition:all .18s;white-space:nowrap}
.ro.on{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border-color:transparent}
.sub-list2{background:var(--s2);border-radius:12px;overflow:hidden;margin-bottom:12px;border:1px solid var(--b2)}
.sub-row2{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--b1);cursor:pointer}
.sub-row2:last-child{border-bottom:none}
.sub-ck{width:20px;height:20px;border-radius:50%;border:2px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .22s}
.sub-ck.done{border-color:transparent}
.sub-ck.done::after{content:'έεΥ';color:#fff;font-size:10px;font-weight:900}
.sub-add2{display:flex;align-items:center;gap:8px;padding:8px 13px}
.sub-add2 input{flex:1;font-size:14px;color:var(--t1)}
.sub-add2 input::placeholder{color:var(--t3)}
.kb-wrap{display:flex;gap:11px;padding:0 18px 20px;overflow-x:auto}
.kb-col{flex-shrink:0;width:240px;background:var(--s1);border-radius:20px;padding:14px;box-shadow:var(--sh)}
.kb-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.kb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.kb-n{font-size:14px;font-weight:800;color:var(--t1);flex:1;text-align:right}
.kb-cnt{font-size:11px;font-weight:700;background:var(--s2);border-radius:50px;padding:2px 9px;color:var(--t2)}
.kb-card{background:var(--s2);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:transform .15s}
.kb-card:active{transform:scale(.97)}
.kb-card-n{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:8px;text-align:right;line-height:1.3}
.kb-mv{display:flex;gap:4px;flex-wrap:wrap}
.kb-btn{padding:5px 9px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:none;transition:transform .15s}
.kb-btn:active{transform:scale(.93)}
.kb-add{width:100%;padding:10px;border-radius:10px;border:1.5px dashed var(--b2);color:var(--ac);font-size:13px;font-weight:700;text-align:center;cursor:pointer;background:none;margin-top:4px}
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 18px}
.nc{background:var(--s1);border-radius:20px;padding:14px;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden;min-height:120px;display:flex;flex-direction:column;gap:5px;box-shadow:var(--sh)}
.nc:active{transform:scale(.96)}
.nc-top{position:absolute;top:0;right:0;left:0;height:4px}
.nc-t{font-size:14px;font-weight:800;color:var(--t1);line-height:1.3;margin-top:4px}
.nc-p{font-size:12px;color:var(--t2);line-height:1.5;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
.nc-tag{font-size:10px;font-weight:700;border-radius:50px;padding:2px 8px}
.nc-date{font-size:10px;color:var(--t3);margin-top:auto}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-dh{text-align:center;font-size:10px;font-weight:700;color:var(--t3);padding:4px 0}
.cal-d{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);transition:all .15s;position:relative}
.cal-d.today{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;font-weight:900}
.cal-d.sel{background:var(--s3);color:var(--t1);font-weight:800}
.cal-d.hev::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--or);position:absolute;bottom:2px}
.hd{font-size:7px;color:rgba(255,255,255,.6)}
.cal-d:not(.today) .hd{color:var(--t3)}
.ac{background:var(--s1);border-radius:20px;padding:18px;margin:0 18px 12px;box-shadow:var(--sh)}
.ac-t{font-size:15px;font-weight:800;color:var(--t1);margin-bottom:14px}
.bch{display:flex;gap:8px;align-items:flex-end;height:88px;margin-bottom:6px}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bb{border-radius:6px 6px 0 0;width:100%;min-height:4px;transition:height .4s}
.bl{font-size:9px;color:var(--t3);font-weight:600}
.lrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.ldot{width:9px;height:9px;border-radius:50%}
.lt{flex:1;font-size:12px;font-weight:600;color:var(--t2);text-align:right}
.lv{font-size:14px;font-weight:900}
.sm{flex:1;background:var(--s2);border-radius:10px;padding:12px 8px;text-align:center}
.sm-v{font-size:22px;font-weight:900;letter-spacing:-1px}
.sm-l{font-size:10px;font-weight:700;color:var(--t3);margin-top:2px}
.set-grp{background:var(--s1);border-radius:20px;overflow:hidden;margin:0 18px 10px;box-shadow:var(--sh)}
.set-lbl{padding:11px 16px 5px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--b1)}
.set-row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:1px solid var(--b1);cursor:pointer}
.set-row:last-child{border-bottom:none}
.set-row:active{background:var(--s2)}
.set-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.set-tx{flex:1;font-size:14px;font-weight:600;text-align:right}
.set-vl{font-size:12px;color:var(--t3)}
.tog{width:48px;height:28px;border-radius:14px;position:relative;flex-shrink:0;cursor:pointer;border:none;padding:0;transition:background .25s}
.tog-k{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.2);transition:left .25s}
.col-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cdot{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .18s}
.cdot.on{border-color:var(--t1);transform:scale(1.15)}
.pomo-ring{position:relative;width:200px;height:200px;margin:0 auto 20px}
.pomo-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pomo-t{font-size:46px;font-weight:900;color:var(--t1);letter-spacing:-2px;line-height:1}
.pomo-m{font-size:13px;font-weight:700;color:var(--ac);margin-top:4px}
.pomo-s{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pomo-d{width:12px;height:12px;border-radius:50%;background:var(--s3);transition:all .3s}
.pomo-d.done{background:var(--ac)}
.ai-msgs{flex:1;overflow-y:auto;padding:0 18px;display:flex;flex-direction:column;gap:12px;min-height:200px}
.ai-u{align-self:flex-start;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border-radius:18px 18px 4px 18px;padding:12px 16px;font-size:14px;font-weight:600;line-height:1.5;max-width:82%}
.ai-b{align-self:flex-end;background:var(--s1);border:1px solid var(--b2);border-radius:18px 18px 18px 4px;padding:12px 16px;font-size:14px;color:var(--t1);line-height:1.6;max-width:88%;box-shadow:var(--sh)}
.ai-lbl{font-size:10px;font-weight:700;color:var(--ac);margin-bottom:5px}
.ai-inp-w{padding:12px 18px 16px;border-top:1px solid var(--b1)}
.ai-row{display:flex;gap:10px;align-items:flex-end;background:var(--s1);border:1.5px solid var(--b2);border-radius:20px;padding:10px 12px;box-shadow:var(--sh)}
.ai-row:focus-within{border-color:var(--ac)}
.ai-inp{flex:1;font-size:15px;color:var(--t1);outline:none;min-height:22px;max-height:80px;overflow-y:auto}
.ai-inp:empty::before{content:attr(data-ph);color:var(--t3)}
.ai-send{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none}
.ai-send:active{transform:scale(.88)}
.ai-q{display:flex;gap:7px;padding:8px 18px 0;overflow-x:auto;flex-shrink:0}
.ai-qb{flex-shrink:0;padding:7px 14px;border-radius:50px;background:var(--s1);border:1.5px solid var(--b2);font-size:12px;font-weight:700;color:var(--ac);cursor:pointer;white-space:nowrap;box-shadow:var(--sh)}
.ai-qb:active{background:var(--ac);color:#fff;border-color:transparent}
.dots{display:inline-flex;gap:4px;align-items:center;padding:4px 0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--t3);animation:db 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes db{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
#fo{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px}
#fo.open{display:flex;animation:fo .3s ease}
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);border-radius:50px;padding:10px 22px;font-size:13.5px;font-weight:700;z-index:500;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .3s;color:#fff}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div id="sb">
    <div class="sb-av" id="sb-av" onclick="setTab('settings')" style="background:linear-gradient(135deg,#6B3F1E,#8B5A2B)">╪μ</div>
    <div><div class="sb-g">┘Ζ╪▒╪φ╪ρ╪π┘Μ╪Ν</div><div class="sb-n" id="sb-name">╪μ╪φ┘Ζ╪ψ έαΧ</div></div>
  </div>

// έΦΑέΦΑ TASK CARD έΦΑέΦΑ
function mkTC(t,i){
  var l=lFor(t),p=pFor(t.pri);
  var accC=t.pri==='high'?'#C0392B':t.pri==='medium'?'#C17F24':t.pri==='low'?'#4A7C59':'transparent';
  var ckSt=t.done?'background:'+l.color+';border-color:'+l.color:'border-color:'+ha(l.color,.45);
  var sdone=t.subs.filter(function(s){return s.done;}).length;
  var spct=t.subs.length?sdone/t.subs.length*100:0;
  var proj=t.proj?projects.find(function(pr){return pr.id===t.proj;}):null;
  var h='<div class="tc" style="animation-delay:'+i*0.03+'s" onclick="openDetail('+t.id+')">';
  h+='<div class="tc-acc" style="background:'+accC+'"></div>';
  h+='<div class="tc-in">';
  h+='<div class="ck'+(t.done?' done':'')+'" style="'+ckSt+'" onclick="event.stopPropagation();togT('+t.id+')"></div>';
  h+='<div class="tb2">';
  h+='<div class="tn'+(t.done?' done':'')+'">'+(t.rec&&t.rec!=='none'?'ΏθΦΒ ':'')+t.name+'</div>';
  if(t.note)h+='<div class="tnote">'+t.note+'</div>';
  h+='<div class="tmeta">';
  h+='<span class="ttag" style="background:'+ha(l.color,.12)+';color:'+l.color+'">'+l.icon+' '+l.name+'</span>';
  if(proj)h+='<span class="ttag" style="background:'+ha(proj.color,.1)+';color:'+proj.color+'">'+proj.icon+' '+proj.name+'</span>';
  if(t.due)h+='<span class="tdt">ΏθΥΖ '+t.due+'</span>';
  if(t.time)h+='<span class="tdt"> ΏθΧΡ '+t.time+'</span>';
  if(t.logged>0)h+='<span class="tdt"> έΠ▒'+t.logged+'╪ψ</span>';
  h+='</div></div>';
  h+='<span class="tpi">'+(PRI_SVG[t.pri]||PRI_SVG.none)+'</span>';
  h+='</div>';
  if(t.subs.length>0)h+='<div class="sub-bar"><div class="sub-fill" style="width:'+spct+'%"></div></div>';
  h+='</div>';
  return h;
}

function renderMD(txt){

    else if(l.startsWith('- ')||l.startsWith('έΑλ '))out+='<div style="padding-right:14px;position:relative;margin-bottom:3px;font-size:15px;color:var(--t1);text-align:right"><span style="position:absolute;right:2px;color:var(--ac)">έΑλ</span>'+l.slice(2)+'</div>';

    else out+='<div style="font-size:15px;color:var(--t1);margin-bottom:3px;text-align:right;line-height:1.7">'+l+'</div>';

  return out;
}

function exportCSV(){
  var rows=['╪π┘Ε┘Ζ╪╣╪▒┘Β,╪π┘Ε╪π╪│┘Ζ,╪π┘Ε┘Γ╪π╪ο┘Ζ╪σ,╪π┘Ε╪μ┘Ι┘Ε┘Ι┘Λ╪σ,╪π┘Ε╪φ╪π┘Ε╪σ,╪π┘Ε╪ς╪π╪▒┘Λ╪χ'];

function fmtAI(txt){
  var lines=txt.split('\n'),out='';
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(l.startsWith('**')&&l.endsWith('**'))out+='<div style="font-weight:800;color:var(--ac);margin:6px 0 3px">'+l.slice(2,-2)+'</div>';
    else if(l.startsWith('* ')||l.startsWith('- '))out+='<div style="padding-right:12px;position:relative;margin-bottom:3px"><span style="position:absolute;right:0;color:var(--ac)">έΑλ</span>'+l.slice(2)+'</div>';
    else if(l==='')out+='<div style="height:4px"></div>';
    else out+='<div style="margin-bottom:3px">'+l+'</div>';
  }
  return out;
}
function aiKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();aiSend();}}

  var msgs=[];

}

function importData(){var inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.tasks)tasks=d.tasks;if(d.notes)notes=d.notes;if(d.projects)projects=d.projects;save();renderSettings();renderTasks();toast('έεΖ ╪ς┘Ζ ╪π┘Ε╪π╪│╪ς┘Λ╪▒╪π╪ψ','var(--gr)');}catch(e){toast('έζΝ ┘Ζ┘Ε┘Β ╪║┘Λ╪▒ ╪╡╪π┘Ε╪φ','var(--rd)');}};r.readAsText(f);};inp.click();}
function openProfEdit(){

  h+='<div class="col-row" style="justify-content:center">';
  for(var i=0;i<PAL.length;i++){h+='<div class="cdot'+(PAL[i]===prof.avColor?' on':'')+'" style="background:'+PAL[i]+'" onclick="pickAC(\''+PAL[i]+'\')"></div>';}
  h+='</div></div>';
  h+='<div class="fg"><div class="fl">╪π┘Ε╪π╪│┘Ζ</div><input class="fi" id="pe-n" value="'+prof.name+'"></div>';
  h+='<div class="fg"><div class="fl">╪π┘Ε┘Ζ╪│┘Ζ┘Κ ╪π┘Ε┘Ι╪╕┘Λ┘Β┘Λ</div><input class="fi" id="pe-r" value="'+prof.role+'"></div>';
  h+='<div class="fg"><div class="fl">╪π┘Ε┘Ζ╪ν╪│╪│╪σ</div><input class="fi" id="pe-o" value="'+prof.org+'"></div>';
  h+='<div class="fg"><div class="fl">╪π┘Ε╪ρ╪▒┘Λ╪ψ</div><input class="fi" id="pe-e" value="'+prof.email+'"></div>';
  h+='<button class="btn btn-p" onclick="savePrf()">ΏθΤ╛ ╪φ┘Β╪╕</button><div style="height:20px"></div>';
  openModal('╪π┘Ε┘Ζ┘Ε┘Β ╪π┘Ε╪┤╪χ╪╡┘Λ',h);
}
function pickAC(c){prof.avColor=c;document.querySelectorAll('#modal .cdot').forEach(function(e,i){e.className='cdot'+(PAL[i]===c?' on':'');});}
function savePrf(){
  var n=document.getElementById('pe-n'),r=document.getElementById('pe-r'),o=document.getElementById('pe-o'),e=document.getElementById('pe-e');
  if(n)prof.name=n.value;if(r)prof.role=r.value;if(o)prof.org=o.value;if(e)prof.email=e.value;
  save();closeModal();renderSettings();toast('έεΖ ╪ς┘Ζ ╪π┘Ε╪φ┘Β╪╕','var(--gr)');
}

  fabEl.style.cssText='position:fixed;bottom:90px;left:22px;width:56px;height:56px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:0 8px 28px rgba(107,63,30,.45);cursor:pointer;z-index:40;transition:all .2s;font-weight:400';

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>FocusFlow</title>
<!-- Manifest file -->
<link rel="manifest" href="manifest.json">
<!-- Service worker registration -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js");
  });
}
</script>
<!-- Apple PWA settings -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FocusFlow">
<!-- Google Font fixed -->
<style>
/* â”€â”€ SHELL â”€â”€ */
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);position:relative}
 
/* â”€â”€ STATUS BAR â”€â”€ */
#sb{flex-shrink:0;padding:env(safe-area-inset-top,14px) 18px 0;display:flex;justify-content:space-between;align-items:center;min-height:56px}
.sb-l .sb-g{font-size:12px;color:var(--t3);font-weight:600}
.sb-l .sb-n{font-size:22px;font-weight:900;color:var(--t1);letter-spacing:-.5px;line-height:1.1}
.sb-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;box-shadow:var(--sh);cursor:pointer;flex-shrink:0}
 
/* â”€â”€ AREA â”€â”€ */
#area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.pg{display:none;min-height:100%;padding-bottom:16px}
.pg.on{display:block;animation:pgIn .24s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
 
/* â”€â”€ TAB BAR â”€â”€ */
#tb{flex-shrink:0;background:var(--s1);border-top:1px solid var(--b1);display:flex;align-items:stretch;padding:0 4px env(safe-area-inset-bottom,10px);box-shadow:0 -4px 20px rgba(107,63,30,.08);border-radius:24px 24px 0 0}
.tbb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 1px 0;cursor:pointer;transition:all .2s;border-radius:12px;margin:5px 1px 0}
.tbb .tlb{font-size:8px !important}
.tbb .tic{width:24px;height:24px;transition:transform .22s;color:var(--t3)}
.tbb.on .tic{transform:scale(1.12) translateY(-2px);color:var(--ac)}
.tbb .tlb{font-size:9px;font-weight:700;color:var(--t3);transition:color .2s}
.tbb.on .tlb{color:var(--ac)}
.tbb.on{background:linear-gradient(135deg,rgba(107,63,30,.1),rgba(139,90,43,.07));border-radius:16px}
.tbb.on .tic path,.tbb.on .tic rect,.tbb.on .tic circle{stroke:var(--ac)}
 
/* â”€â”€ PAGE PADDING â”€â”€ */
.pp{padding:0 18px}
 
/* â”€â”€ SECTION HEADER â”€â”€ */
.sh2{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 10px}
.sh2-t{font-size:20px;font-weight:900;color:var(--t1);letter-spacing:-.5px}
.sh2-a{font-size:13px;font-weight:700;color:var(--ac)}
 
/* â”€â”€ HERO CARD â”€â”€ */
.hero{background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:var(--r-xl);padding:22px;margin:14px 18px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(107,63,30,.3)}
.hero::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.07);top:-70px;left:-50px;pointer-events:none}
.hero::after{content:'';position:absolute;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.05);bottom:-50px;right:-20px;pointer-events:none}
.hero-lbl{font-size:11px;color:rgba(255,255,255,.65);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;position:relative}
.hero-num{font-size:56px;font-weight:900;color:#fff;letter-spacing:-3px;line-height:1;position:relative}
.hero-sub{font-size:13px;color:rgba(255,255,255,.75);font-weight:600;margin-top:4px;position:relative}
.hero-pills{display:flex;gap:8px;margin-top:16px;position:relative;flex-wrap:wrap}
.hero-pill{background:rgba(255,255,255,.18);border-radius:var(--r-f);padding:7px 14px;display:flex;align-items:center;gap:6px}
.hero-pill span{font-size:12px;font-weight:700;color:#fff}
 
/* â”€â”€ STAT STRIP â”€â”€ */
.stat-strip{display:flex;gap:9px;padding:0 18px 12px;overflow-x:auto}
.ssc{flex-shrink:0;min-width:84px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-xl);padding:14px 10px;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:transform .18s;position:relative;overflow:hidden}
.ssc:active{transform:scale(.94)}
.ssc-i{height:24px;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.ssc-v{font-size:26px;font-weight:900;line-height:1;letter-spacing:-1.5px}
.ssc-l{font-size:10px;font-weight:700;color:var(--t3);margin-top:3px}
.ssc-bar{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0}
 
/* â”€â”€ CHIPS â”€â”€ */
.chips{display:flex;gap:7px;padding:0 18px 12px;overflow-x:auto}
.chip{flex-shrink:0;border-radius:var(--r-f);padding:9px 14px;font-size:13px;font-weight:700;border:1.5px solid var(--b2);color:var(--t2);white-space:nowrap;display:flex;align-items:center;gap:5px;cursor:pointer;background:var(--s1);transition:all .2s;box-shadow:var(--sh)}
.chip.on{color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(107,63,30,.3)}
.chip-n{font-size:10px;font-weight:800;background:rgba(255,255,255,.28);border-radius:var(--r-f);padding:1px 6px}
 
/* â”€â”€ SEARCH â”€â”€ */
.srch{display:flex;align-items:center;gap:10px;background:var(--s1);border:1.5px solid var(--b2);border-radius:var(--r-md);padding:11px 14px;margin:0 18px 12px;box-shadow:var(--sh);transition:border-color .2s}
.srch:focus-within{border-color:var(--ac)}
.srch input{flex:1;font-size:15px;color:var(--t1);font-weight:500}
.srch input::placeholder{color:var(--t3)}
.srch-ic{font-size:16px;color:var(--t3)}
.srch-x{font-size:13px;color:var(--t3);cursor:pointer;padding:2px 6px}
 
/* â”€â”€ TASK CARD â”€â”€ */
.tc{background:var(--s1);border-radius:var(--r-lg);margin-bottom:9px;overflow:hidden;cursor:pointer;box-shadow:var(--sh);transition:transform .15s;animation:cin .22s ease both;position:relative}
@keyframes cin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.tc:active{transform:scale(.983)}
.tc-acc{position:absolute;right:0;top:0;bottom:0;width:4px;border-radius:0 var(--r-lg) var(--r-lg) 0}
.tc-in{display:flex;align-items:flex-start;gap:11px;padding:14px 14px 14px 14px}
.ck{width:27px;height:27px;border-radius:50%;border:2.5px solid var(--b3);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .25s;cursor:pointer;background:none}
.ck.done{border-color:transparent}
.ck.done::after{content:'âœ“';color:#fff;font-size:13px;font-weight:900}
.tb{flex:1;min-width:0}
.tn{font-size:15px;font-weight:700;color:var(--t1);line-height:1.3}
.tn.done{color:var(--t3);text-decoration:line-through}
.tnote{font-size:12px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tmeta{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center}
.ttag{font-size:11px;font-weight:700;border-radius:7px;padding:2px 9px}
.tdt{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:3px}
.tpi{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center}
.sub-bar{height:3px;background:var(--s2);margin:0 14px 10px;border-radius:var(--r-f);overflow:hidden}
.sub-fill{height:100%;border-radius:var(--r-f);background:linear-gradient(90deg,var(--ac),var(--ac2))}
 
/* â”€â”€ EMPTY â”€â”€ */
.empty{text-align:center;padding:50px 24px}
.empty-ic{font-size:52px;margin-bottom:12px;opacity:.35;display:block}
.empty-t{font-size:18px;font-weight:800;color:var(--t2)}
.empty-s{font-size:13px;color:var(--t3);margin-top:5px}
 
/* â”€â”€ SEC LABEL â”€â”€ */
.slbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;padding:10px 18px 5px;display:block}
 
/* â”€â”€ FAB â”€â”€ */
.fab{position:fixed;bottom:90px;left:22px;width:58px;height:58px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:0 8px 28px rgba(107,63,30,.45);cursor:pointer;z-index:40;transition:all .2s}
.fab:active{transform:scale(.88)}
 
/* â”€â”€ MODAL / SHEET â”€â”€ */
#modal{position:fixed;inset:0;background:rgba(44,24,16,.55);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
#modal.open{display:flex;animation:fo .2s ease}
@keyframes fo{from{opacity:0}to{opacity:1}}
.sheet{background:var(--s1);width:100%;max-width:430px;border-radius:28px 28px 0 0;border-top:2px solid var(--b1);max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:su .32s cubic-bezier(.32,.72,0,1);padding-bottom:40px}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-hand{width:42px;height:5px;background:var(--s3);border-radius:3px;margin:13px auto 0}
.sh-top{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 10px}
.sh-tit{font-size:21px;font-weight:900;color:var(--t1)}
.sh-x{width:30px;height:30px;background:var(--s2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t2);cursor:pointer;border:1px solid var(--b1)}
.sh-body{padding:0 20px}
 
/* â”€â”€ FORM â”€â”€ */
.fg{margin-bottom:14px}
.fl{font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fi{width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:var(--r-sm);padding:12px 14px;font-size:15px;color:var(--t1);transition:border-color .2s}
.fi:focus{border-color:var(--ac)}
.fta{width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:var(--r-sm);padding:12px 14px;font-size:15px;color:var(--t1);height:78px;transition:border-color .2s}
.fta:focus{border-color:var(--ac)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
 
/* â”€â”€ BUTTONS â”€â”€ */
.btn{width:100%;padding:15px;border-radius:var(--r-md);font-size:16px;font-weight:800;transition:all .2s;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 6px 22px rgba(107,63,30,.35)}
.btn-s{background:var(--gr);color:#fff;box-shadow:0 6px 18px rgba(74,124,89,.3)}
.btn-d{background:rgba(192,57,43,.1);color:var(--rd);border:1.5px solid rgba(192,57,43,.2)}
.btn-g{background:none;color:var(--ac);border:1.5px solid var(--b2);box-shadow:none}
.btn-exp{background:var(--s2);color:var(--t1);border:1.5px solid var(--b2);font-size:14px;padding:12px}
 
/* â”€â”€ PRIORITY GRID â”€â”€ */
.pri-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.pb{background:var(--s2);border:2px solid var(--b2);border-radius:var(--r-sm);padding:10px 4px;text-align:center;cursor:pointer;transition:all .2s}
.pb.on{border-width:2px}
 
/* â”€â”€ REC OPTS â”€â”€ */
.rec-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.ro{padding:8px 14px;border-radius:var(--r-f);background:var(--s2);border:1.5px solid var(--b2);font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;transition:all .18s;white-space:nowrap}
.ro.on{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border-color:transparent}
 
/* â”€â”€ SUB ITEMS â”€â”€ */
.sub-list{background:var(--s2);border-radius:var(--r-md);overflow:hidden;margin-bottom:12px}
.sub-row{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .15s}
.sub-row:last-child{border-bottom:none}
.sub-row:active{background:var(--s3)}
.sub-ck{width:20px;height:20px;border-radius:50%;border:2px solid var(--b3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .22s}
.sub-ck.done{border-color:transparent}
.sub-ck.done::after{content:'âœ“';color:#fff;font-size:10px;font-weight:900}
.sub-add{display:flex;align-items:center;gap:8px;padding:8px 13px}
.sub-add input{flex:1;font-size:14px;color:var(--t1)}
.sub-add input::placeholder{color:var(--t3)}
 
/* â”€â”€ KANBAN â”€â”€ */
.kb-wrap{display:flex;gap:11px;padding:0 18px 20px;overflow-x:auto}
.kb-col{flex-shrink:0;width:240px;background:var(--s1);border-radius:var(--r-xl);padding:14px;box-shadow:var(--sh)}
.kb-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.kb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.kb-n{font-size:14px;font-weight:800;color:var(--t1);flex:1;text-align:right}
.kb-cnt{font-size:11px;font-weight:700;background:var(--s2);border-radius:var(--r-f);padding:2px 9px;color:var(--t2)}
.kb-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r-md);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .18s;animation:cin .2s ease}
.kb-card:active{transform:scale(.97)}
.kb-card-n{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:8px;text-align:right;line-height:1.3}
.kb-mv{display:flex;gap:4px;flex-wrap:wrap}
.kb-btn{padding:5px 9px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.kb-btn:active{transform:scale(.93)}
.kb-add-btn{width:100%;padding:10px;border-radius:var(--r-sm);border:1.5px dashed var(--b3);color:var(--ac);font-size:13px;font-weight:700;text-align:center;cursor:pointer;background:none;margin-top:4px;transition:all .2s}
 
/* â”€â”€ NOTES â”€â”€ */
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 18px}
.nc{background:var(--s1);border-radius:var(--r-xl);padding:14px;cursor:pointer;transition:transform .18s;position:relative;overflow:hidden;min-height:120px;display:flex;flex-direction:column;gap:5px;box-shadow:var(--sh)}
.nc:active{transform:scale(.96)}
.nc-top{position:absolute;top:0;right:0;left:0;height:4px;border-radius:var(--r-xl) var(--r-xl) 0 0}
.nc-pin{position:absolute;top:12px;left:12px;font-size:12px}
.nc-t{font-size:14px;font-weight:800;color:var(--t1);line-height:1.3;margin-top:4px}
.nc-p{font-size:12px;color:var(--t2);line-height:1.5;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
.nc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.nc-tag{font-size:10px;font-weight:700;border-radius:var(--r-f);padding:2px 8px}
.nc-date{font-size:10px;color:var(--t3);margin-top:auto}
 
/* â”€â”€ MARKDOWN â”€â”€ */
.md-h1{font-size:20px;font-weight:900;color:var(--t1);margin-bottom:8px;text-align:right}
.md-h2{font-size:17px;font-weight:800;color:var(--t1);margin-bottom:6px;text-align:right}
.md-h3{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:5px;text-align:right}
.md-p{font-size:15px;color:var(--t1);line-height:1.7;text-align:right;margin-bottom:6px}
.md-li{font-size:15px;color:var(--t1);line-height:1.7;padding-right:18px;position:relative;margin-bottom:4px;text-align:right}
.md-li::before{content:'â€¢';position:absolute;right:4px;color:var(--ac)}
.md-hr{height:1px;background:var(--b2);margin:10px 0}
 
/* â”€â”€ STATS â”€â”€ */
.anal-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-xl);padding:18px;margin:0 18px 12px;box-shadow:var(--sh)}
.anal-t{font-size:15px;font-weight:800;color:var(--t1);margin-bottom:14px;text-align:right}
.bar-chart{display:flex;gap:8px;align-items:flex-end;height:90px;margin-bottom:6px}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.b-bar{border-radius:6px 6px 0 0;width:100%;min-height:4px;transition:height .4s ease}
.b-lbl{font-size:9px;color:var(--t3);font-weight:600}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.leg-dot{width:9px;height:9px;border-radius:50%}
.leg-t{flex:1;font-size:12px;font-weight:600;color:var(--t2);text-align:right}
.leg-v{font-size:14px;font-weight:900}
.stat-mini{flex:1;background:var(--s2);border-radius:var(--r-sm);padding:12px 8px;text-align:center}
.stat-mini-v{font-size:22px;font-weight:900;letter-spacing:-1px}
.stat-mini-l{font-size:10px;font-weight:700;color:var(--t3);margin-top:2px}
 
/* â”€â”€ CALENDAR â”€â”€ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-dh{text-align:center;font-size:10px;font-weight:700;color:var(--t3);padding:4px 0}
.cal-d{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:11px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);transition:all .15s;position:relative}
.cal-d.today{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;font-weight:900;box-shadow:0 4px 12px rgba(107,63,30,.3)}
.cal-d.sel{background:var(--s3);color:var(--t1);font-weight:800;border:1.5px solid rgba(107,63,30,.3)}
.cal-d.hev::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--or);position:absolute;bottom:2px}
.hijri-d{font-size:7px;color:rgba(255,255,255,.7);line-height:1}
.cal-d:not(.today) .hijri-d{color:var(--t3)}
 
/* â”€â”€ POMODORO â”€â”€ */
.pomo-ring{position:relative;width:200px;height:200px;margin:0 auto 20px}
.pomo-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pomo-time{font-size:48px;font-weight:900;color:var(--t1);letter-spacing:-2px;line-height:1}
.pomo-mode{font-size:13px;font-weight:700;color:var(--ac);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.pomo-sess{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pomo-dot{width:12px;height:12px;border-radius:50%;background:var(--s3);transition:all .3s}
.pomo-dot.done{background:var(--ac);box-shadow:0 0 8px rgba(107,63,30,.5)}
 
/* â”€â”€ SETTINGS â”€â”€ */
.set-grp{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-xl);overflow:hidden;margin:0 18px 10px;box-shadow:var(--sh)}
.set-lbl{padding:11px 16px 5px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--b1)}
.set-row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .15s}
.set-row:last-child{border-bottom:none}
.set-row:active{background:var(--s2)}
.set-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.set-tx{flex:1;font-size:14px;font-weight:600;text-align:right}
.set-vl{font-size:12px;color:var(--t3)}
.tog{width:48px;height:28px;border-radius:14px;position:relative;flex-shrink:0;cursor:pointer;border:none;transition:background .25s;padding:0}
.tog-k{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.25);transition:left .25s}
 
/* â”€â”€ COLOR PICKER â”€â”€ */
.col-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cdot{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .18s}

.proj-card:active{transform:scale(.985)}
.proj-banner{padding:20px;position:relative;overflow:hidden;min-height:100px}
.proj-gl{position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(255,255,255,.15),transparent)}
.proj-n{font-size:19px;font-weight:900;color:#fff;position:relative;line-height:1.1}
.proj-d{font-size:12px;color:rgba(255,255,255,.6);position:relative;margin-top:3px}
.proj-foot{padding:14px 16px;background:var(--s1)}
.proj-prog{height:6px;background:var(--s2);border-radius:var(--r-f);overflow:hidden;margin-bottom:8px}
.proj-prog-b{height:100%;border-radius:var(--r-f);transition:width .4s}
 
/* â”€â”€ FOCUS MODE OVERLAY â”€â”€ */
#focus-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px}
#focus-overlay.open{display:flex;animation:fo .3s ease}
 
/* â”€â”€ AI ASSISTANT â”€â”€ */
.ai-chat{display:flex;flex-direction:column;height:calc(100dvh - 180px);padding:0}
.ai-msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 18px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:82%;animation:cin .22s ease}
.ai-msg.user{align-self:flex-start;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border-radius:18px 18px 4px 18px;padding:12px 16px;font-size:14px;font-weight:600;line-height:1.5;box-shadow:0 4px 14px rgba(107,63,30,.25)}
.ai-msg.bot{align-self:flex-end;background:var(--s1);border:1px solid var(--b2);border-radius:18px 18px 18px 4px;padding:12px 16px;font-size:14px;color:var(--t1);line-height:1.6;box-shadow:var(--sh)}

    return f.format(new Date(date));
  }catch(e){return '';}
}

  }catch(e){return '';}
}

function renderMD(txt){
  var lines=txt.split('\n'),out='';
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(l.startsWith('# '))out+='<div class="md-h1">'+l.slice(2)+'</div>';
    else if(l.startsWith('## '))out+='<div class="md-h2">'+l.slice(3)+'</div>';
    else if(l.startsWith('### '))out+='<div class="md-h3">'+l.slice(4)+'</div>';
    else if(l.startsWith('- ')||l.startsWith('â€¢ '))out+='<div class="md-li">'+l.slice(2)+'</div>';
    else if(l==='---')out+='<div class="md-hr"></div>';
    else if(l==='')out+='<div style="height:6px"></div>';
    else out+='<div class="md-p">'+l+'</div>';
  }
  return out;
}

function formatAIResponse(txt){
  if(!txt)return '';
  var lines=txt.split('\n'),out='';
  for(var i=0;i<lines.length;i++){

      out+='<div style="padding-right:12px;position:relative;margin-bottom:3px;color:var(--t1)"><span style="position:absolute;right:0;color:var(--ac)">â€¢</span>'+l.slice(2)+'</div>';
    } else if(l.match(/^\d+\./)){
      out+='<div style="padding-right:16px;position:relative;margin-bottom:4px;color:var(--t1)"><span style="position:absolute;right:0;color:var(--ac);font-weight:700">'+l.match(/^\d+/)[0]+'.</span>'+l.replace(/^\d+\.\s*/,'')+'</div>';
    } else if(l===''){

    }
  }
  return out;
}
